version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: house_price_api_dev
    ports:
      - "8000:8000"
    environment:
      - DATA_PATH=/app/data/data.csv
      - MODEL_DIR=/app/saved_models
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src:ro           # mount source for auto-reload
      - ./data:/app/data:ro
      - ./saved_models:/app/saved_models
      - ./logs:/app/logs
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0",
              "--port", "8000", "--reload"]
    restart: unless-stopped

  frontend:
    image: node:20-slim
    container_name: house_price_frontend_dev
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules        # anonymous volume so host node_modules stays clean
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api
    restart: unless-stopped
