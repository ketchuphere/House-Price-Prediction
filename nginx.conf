# nginx.conf
# ──────────────────────────────────────────────────────────────────────────────
# Reverse proxy for the House Price Prediction full-stack app.
#
# Architecture:
#   Browser  →  nginx :80
#                 ├── /predict*, /api/*, /health, /docs, /redoc
#                 │        → FastAPI backend (house_price_api:8000)
#                 └── /*   → React SPA (static files from /usr/share/nginx/html)
#
# This config keeps the frontend and backend on the same origin (no CORS issues
# in production) and allows zero-downtime rolling deploys of either service.
# ──────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    #Gzip static assets for faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    #Upstream: FastAPI backend
    upstream api {
        server house_price_api:8000;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        #API routes - backend
        location ~ ^/(predict|api|health|docs|redoc|openapi\.json) {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;   # allow time for /api/train
        }

        #Static assets (hashed filenames — long cache)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        #SPA fallback: all other GET requests return index.html
        #React Router handles client-side navigation.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
